<style type="text/css">
<!-- БЛОК НИЖЕ УДАЛИТЬ ПЕРЕД ВСТАВКОЙ НА ФОРУМ -->
:root {
  --bg:#1d1f25;
  --card:#1d1f25;
  --card-hover:#242845;
  --text:#e7e9f0;
  --muted:#a9adc1;
  --accent:#4da3ff;
  --border:rgba(255,255,255,0.08);
}
body { background-color: var(--bg); margin:0; font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; color:var(--text);}
<!-- БЛОК ВЫШЕ УДАЛИТЬ ПЕРЕД ВСТАВКОЙ НА ФОРУМ -->
  
.mv-wrapper {
  --bg: #1d1f25;
  --card: #1f2230;
  --card-hover: #242845;
  --text: #e7e9f0;
  --muted: #a9adc1;
  --accent: #4da3ff;
  --border: rgba(255,255,255,0.08);

  font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  color: var(--text);
  padding: 20px;
  max-width: 1200px;
  margin: 0 auto;
}

.mv-wrapper * { box-sizing: border-box; }

.mv-wrapper main { opacity: 0; transition: opacity 0.8s ease; }
.mv-wrapper main.loaded { opacity: 1; }

.mv-category { margin-top: 40px; }
.mv-category h2 {
  margin: 0 0 18px;
  font-size: 22px;
  border-left: 4px solid var(--accent);
  padding-left: 10px;
}

.mv-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 18px;
  align-items: start;
}

.mv-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 18px;
  overflow: hidden;
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.5s ease, transform 0.5s ease, box-shadow .25s ease, background .25s ease;
}

.mv-card.show { opacity: 1; transform: translateY(0); }

.mv-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 10px 30px rgba(0,0,0,.35);
  background: var(--card-hover);
}

.mv-photo { aspect-ratio: 1 / 1; background: #0c0f1f; overflow: hidden; display: grid; place-items: center; }
.mv-photo img { width: 100%; height: 100%; object-fit: cover; }

.mv-content { padding: 14px; display: grid; gap: 4px; }
.mv-name { font-weight: 600; }
.mv-name a { color: var(--text); text-decoration: none; transition: .2s; }
.mv-name a:hover { color: var(--accent); }

.mv-rank { color: var(--muted); font-size: 14px; }

.mv-fractions { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
.mv-fraction { display: inline-block; background: rgba(77,163,255,0.1); color: var(--accent); font-size: 12px; padding: 2px 6px; border-radius: 8px; white-space: nowrap; }

.mv-details { background: #0f1220; border: 1px solid var(--border); border-radius: 12px; padding: 8px; }
.mv-details summary { cursor: pointer; color: var(--accent); }

.mv-awards { margin-top: 8px; display: grid; gap: 6px; font-size: 14px; }
.mv-award { padding-left: 12px; position: relative; }
.mv-award::before { content: "•"; position: absolute; left: 0; color: var(--accent); }

#mv-loader { width: 100%; padding: 40px 0; display: flex; justify-content: center; }
.mv-spinner { width: 60px; height: 60px; border: 6px solid rgba(77,163,255,0.2); border-top-color: var(--accent); border-radius: 50%; animation: mv-spin 1s linear infinite; }
@keyframes mv-spin { to { transform: rotate(360deg); } }

/* Поиск */
.mv-search { margin-bottom: 30px; display: flex; justify-content: center; }
.mv-search input {
  width: 100%;
  max-width: 400px;
  padding: 12px 20px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 30px;
  color: var(--text);
  font-size: 16px;
  transition: all 0.3s ease;
  outline: none;
}
.mv-search input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px rgba(77,163,255,0.2);
}
.mv-search input::placeholder { color: var(--muted); }

.mv-card.hidden { display: none !important; }
.mv-category.hidden { display: none !important; }
.mv-no-results {
  text-align: center;
  padding: 40px;
  color: var(--muted);
  font-size: 18px;
  background: var(--card);
  border-radius: 18px;
  border: 1px solid var(--border);
  margin-top: 20px;
}

.mv-content-container { position: relative; min-height: 200px; }
</style>

<div class="mv-wrapper">
  <div class="mv-search">
    <input type="text" id="mv-search-input" placeholder="Поиск по нику..." autocomplete="off">
  </div>

  <div class="mv-content-container">
    <div id="mv-loader"><div class="mv-spinner">&#8203;</div></div>
    <main id="mv-container">&#8203;</main>
  </div>
</div>

<script>
(function() {
  const sheetID = "1Eovg6RgVQdh94T2eBuQ7KuWbCzjsJc9IeifSzvDsvaQ";
  const sheetName = "База";
  const url = `https://opensheet.elk.sh/${sheetID}/${encodeURIComponent(sheetName)}`;

  const container = document.getElementById("mv-container");
  const loader = document.getElementById("mv-loader");
  const searchInput = document.getElementById("mv-search-input");

  const allAwards = [
    "герой республики провинция",
    "медаль «за доблесть в службе»",
    "медаль и. д. путилина",
    "медаль «за смелость во имя спасения»",
    "медаль «за заслуги в особых условиях»",
    "медаль «за выслугу лет» i степени",
    "медаль «за выслугу лет» ii степени",
    "медаль «за выслугу лет» iii степени",
    "медаль «за укрепление безопасности дорожного движения»",
    "медаль «за вклад в укрепление правопорядка»"
  ];

  const braveAwards = [
    "герой республики провинция",
    "медаль «за смелость во имя спасения»"
  ];

  const rankCategories = [
    { title: "Высший начальствующий состав органов внутренних дел, представленный к награде", ranks: ["генерал-полковник полиции","генерал-лейтенант полиции","генерал-майор полиции"] },
    { title: "Старший начальствующий состав органов внутренних дел, представлен к награде", ranks: ["полковник полиции","подполковник полиции","майор полиции"] },
    { title: "Средний начальствующий состав органов внутренних дел, представлен к награде", ranks: ["капитан полиции","старший лейтенант полиции","лейтенант полиции"] },
    { title: "Младший начальствующий состав органов внутренних дел, представлен к награде", ranks: ["прапорщик полиции","старшина полиции","сержант полиции"] },
    { title: "Рядовой состав органов внутренних дел, представлен к награде", ranks: ["рядовой полиции"] }
  ];

  function normalize(t) { return t ? t.toLowerCase().trim() : ""; }

  function cleanAward(str) {
    return str
      .toLowerCase()
      .replace(/["“”«»]/g, '')
      .replace(/посмертно/g, '')
      .trim();
  }

  fetch(url)
    .then(res => res.json())
    .then(data => { if (!Array.isArray(data)) throw new Error("Invalid data format"); render(data); })
    .catch(err => {
      console.error(err);
      container.innerHTML = "<p style='color:red;text-align:center;'>Ошибка загрузки данных.</p>";
      loader.style.display = "none";
      container.classList.add("loaded");
    });

  function render(data) {
    container.innerHTML = "";

    const people = {};
    data.forEach(row => {
      const name = row.name;
      if (!people[name]) {
        people[name] = {
          name: row.name,
          rank: row.rank,
          photo: row.photo,
          forum_url: row.forum_url,
          type: row.type,
          fraction: row.fraction,
          awards: []
        };
      }
      if (row.award) {
        const awards = row.award.split(";").map(a => a.trim()).filter(a => a);
        people[name].awards.push(...awards);
      }
    });

    const list = Object.values(people);
    const used = new Set();

    renderBrave(list, used);
    renderRanks(list, used);
    renderCivilians(list, used);

    loader.style.display = "none";
    container.classList.add("loaded");

    const cards = container.querySelectorAll(".mv-card");
    cards.forEach((card, index) => setTimeout(() => card.classList.add("show"), index * 60));

    if (searchInput) {
      searchInput.addEventListener("input", handleSearch);
    }
  }

  function renderBrave(list, used) {
    const brave = list.filter(p =>
      p.type === "Сотрудник" &&
      p.awards.some(a => braveAwards.some(b => cleanAward(a) === cleanAward(b))) &&
      !used.has(p.name)
    );

    if (!brave.length) return;

    const rankOrder = {
      "генерал-полковник полиции": 1,
      "генерал-лейтенант полиции": 2,
      "генерал-майор полиции": 3,
      "полковник полиции": 4,
      "подполковник полиции": 5,
      "майор полиции": 6,
      "капитан полиции": 7,
      "старший лейтенант полиции": 8,
      "лейтенант полиции": 9,
      "прапорщик полиции": 10,
      "старшина полиции": 11,
      "сержант полиции": 12,
      "рядовой полиции": 13
    };

    brave.sort((a, b) => {
      const rankA = rankOrder[normalize(a.rank)] || 999;
      const rankB = rankOrder[normalize(b.rank)] || 999;
      if (rankA !== rankB) return rankA - rankB;
      return normalize(a.name).localeCompare(normalize(b.name), "ru");
    });

    brave.forEach(p => used.add(p.name));
    createSection("Лица, награжденные за мужественный поступок, совершенный в условиях, сопряженных с риском для жизни", brave);
  }

  function renderRanks(list, used) {
    rankCategories.forEach(cat => {
      const normalizedCatRanks = cat.ranks.map(r => normalize(r));

      let filtered = list.filter(p =>
        p.type === "Сотрудник" &&
        normalizedCatRanks.includes(normalize(p.rank)) &&
        !used.has(p.name)
      );

      if (!filtered.length) return;

      filtered.sort((a, b) => {
        const rankA = normalizedCatRanks.indexOf(normalize(a.rank));
        const rankB = normalizedCatRanks.indexOf(normalize(b.rank));
        if (rankA !== rankB) return rankA - rankB;
        return normalize(a.name).localeCompare(normalize(b.name), "ru");
      });

      filtered.forEach(p => used.add(p.name));
      createSection(cat.title, filtered);
    });
  }

  function renderCivilians(list, used) {
    const civ = list.filter(p => p.type === "Гражданский" && !used.has(p.name));
    if (!civ.length) return;

    civ.sort((a, b) => normalize(a.name).localeCompare(normalize(b.name), "ru"));
    civ.forEach(p => used.add(p.name));
    createSection("Гражданские и иные лица, представленные к награде органов внутренних дел", civ);
  }

  function createSection(title, employees) {
    const section = document.createElement("section");
    section.className = "mv-category";

    const h2 = document.createElement("h2");
    h2.textContent = title;
    section.appendChild(h2);

    const grid = document.createElement("div");
    grid.className = "mv-grid";
    section.appendChild(grid);

    employees.forEach(person => grid.appendChild(createCard(person)));
    container.appendChild(section);
  }

  function createCard(person) {
    const card = document.createElement("article");
    card.className = "mv-card";

    const photoDiv = document.createElement("div");
    photoDiv.className = "mv-photo";
    if (person.photo) {
      const img = document.createElement("img");
      img.src = person.photo;
      img.alt = person.name || "";
      photoDiv.appendChild(img);
    } else {
      photoDiv.textContent = "Нет фото";
    }

    const contentDiv = document.createElement("div");
    contentDiv.className = "mv-content";

    const nameDiv = document.createElement("div");
    nameDiv.className = "mv-name";
    if (person.forum_url) {
      const a = document.createElement("a");
      a.href = person.forum_url;
      a.target = "_blank";
      a.rel = "noopener noreferrer";
      a.textContent = person.name || "";
      nameDiv.appendChild(a);
    } else {
      nameDiv.textContent = person.name || "";
    }

    const rankDiv = document.createElement("div");
    rankDiv.className = "mv-rank";
    rankDiv.textContent = person.rank || "";

    const fractionsWrapper = document.createElement("div");
    fractionsWrapper.className = "mv-fractions";
    if (person.fraction) {
      person.fraction.split(";").map(f => f.trim()).forEach(f => {
        const badge = document.createElement("div");
        badge.className = "mv-fraction";
        badge.textContent = f;
        fractionsWrapper.appendChild(badge);
      });
    }

    const details = document.createElement("details");
    details.className = "mv-details";
    const summary = document.createElement("summary");
    summary.textContent = "Награды";
    details.appendChild(summary);

    const awardsDiv = document.createElement("div");
    awardsDiv.className = "mv-awards";

    person.awards.sort((a, b) => {
      const idxA = allAwards.indexOf(a);
      const idxB = allAwards.indexOf(b);
      return idxA - idxB;
    });

    person.awards.forEach(a => {
      const award = document.createElement("div");
      award.className = "mv-award";
      award.textContent = a;
      awardsDiv.appendChild(award);
    });

    details.appendChild(awardsDiv);

    contentDiv.appendChild(nameDiv);
    contentDiv.appendChild(rankDiv);
    contentDiv.appendChild(fractionsWrapper);
    contentDiv.appendChild(details);

    card.appendChild(photoDiv);
    card.appendChild(contentDiv);

    return card;
  }

  function handleSearch() {
    const searchTerm = searchInput.value.toLowerCase().trim();

    const oldMsg = document.getElementById("mv-no-results-message");
    if (oldMsg) oldMsg.remove();

    const cards = document.querySelectorAll(".mv-card");
    const sections = document.querySelectorAll(".mv-category");

    if (searchTerm === "") {
      cards.forEach(c => c.classList.remove("hidden"));
      sections.forEach(s => s.classList.remove("hidden"));
      return;
    }

    let visibleCount = 0;

    cards.forEach(card => {
      const nameElement = card.querySelector(".mv-name");
      if (nameElement) {
        const name = nameElement.textContent.toLowerCase();
        if (name.includes(searchTerm)) {
          card.classList.remove("hidden");
          visibleCount++;
        } else {
          card.classList.add("hidden");
        }
      }
    });

    sections.forEach(section => {
      const visibleCards = section.querySelectorAll(".mv-card:not(.hidden)");
      if (visibleCards.length === 0) {
        section.classList.add("hidden");
      } else {
        section.classList.remove("hidden");
      }
    });

    if (visibleCount === 0) {
      const noResultsMsg = document.createElement("div");
      noResultsMsg.id = "mv-no-results-message";
      noResultsMsg.className = "mv-no-results";
      noResultsMsg.textContent = `По запросу «${searchTerm}» ничего не найдено`;
      container.appendChild(noResultsMsg);
    }
  }
})();
</script>
