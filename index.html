<style>
/* ПОЛНОСТЬЮ ИЗОЛИРОВАННЫЕ СТИЛИ - игнорируют любые стили форума */
.mv-wrapper,
.mv-wrapper *,
.mv-wrapper *::before,
.mv-wrapper *::after {
  all: initial !important;
  display: revert !important;
  box-sizing: border-box !important;
  font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif !important;
}

.mv-wrapper {
  --bg: #1d1f25 !important;
  --card: #1f2230 !important;
  --card-hover: #242845 !important;
  --text: #e7e9f0 !important;
  --muted: #a9adc1 !important;
  --accent: #4da3ff !important;
  --border: rgba(255,255,255,0.08) !important;

  display: block !important;
  width: 100% !important;
  max-width: 1200px !important;
  margin: 0 auto !important;
  padding: 20px !important;
  color: var(--text) !important;
  background: transparent !important;
  font-size: 16px !important;
  line-height: 1.5 !important;
  text-align: left !important;
  position: relative !important;
  z-index: 1 !important;
}

.mv-wrapper main {
  display: block !important;
  opacity: 0 !important;
  transition: opacity 0.8s ease !important;
  width: 100% !important;
}

.mv-wrapper main.loaded {
  opacity: 1 !important;
}

.mv-category {
  display: block !important;
  margin-top: 40px !important;
  width: 100% !important;
}

.mv-category h2 {
  display: block !important;
  margin: 0 0 18px 0 !important;
  padding: 0 0 0 10px !important;
  font-size: 22px !important;
  font-weight: bold !important;
  line-height: 1.2 !important;
  color: var(--text) !important;
  background: none !important;
  border: none !important;
  border-left: 4px solid var(--accent) !important;
  text-transform: none !important;
  letter-spacing: normal !important;
  font-family: inherit !important;
}

.mv-grid {
  display: grid !important;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)) !important;
  gap: 18px !important;
  align-items: start !important;
  width: 100% !important;
  margin: 0 !important;
  padding: 0 !important;
}

.mv-card {
  display: block !important;
  width: 100% !important;
  background: var(--card) !important;
  border: 1px solid var(--border) !important;
  border-radius: 18px !important;
  overflow: hidden !important;
  opacity: 0 !important;
  transform: translateY(20px) !important;
  transition: opacity 0.5s ease, transform 0.5s ease, box-shadow 0.25s ease, background 0.25s ease !important;
  margin: 0 !important;
  padding: 0 !important;
  box-shadow: none !important;
  position: relative !important;
}

.mv-card.show {
  opacity: 1 !important;
  transform: translateY(0) !important;
}

.mv-card:hover {
  transform: translateY(-4px) !important;
  box-shadow: 0 10px 30px rgba(0,0,0,0.35) !important;
  background: var(--card-hover) !important;
}

.mv-photo {
  display: block !important;
  aspect-ratio: 1 / 1 !important;
  width: 100% !important;
  background: #0c0f1f !important;
  overflow: hidden !important;
  margin: 0 !important;
  padding: 0 !important;
}

.mv-photo img {
  display: block !important;
  width: 100% !important;
  height: 100% !important;
  object-fit: cover !important;
  margin: 0 !important;
  padding: 0 !important;
  border: none !important;
  border-radius: 0 !important;
}

.mv-content {
  display: grid !important;
  grid-template-columns: 1fr !important;
  gap: 8px !important;
  padding: 14px !important;
  margin: 0 !important;
  background: transparent !important;
}

.mv-name {
  display: block !important;
  font-weight: 600 !important;
  font-size: 16px !important;
  line-height: 1.3 !important;
  color: var(--text) !important;
  margin: 0 !important;
  padding: 0 !important;
  background: transparent !important;
}

.mv-name a {
  display: inline-block !important;
  color: var(--text) !important;
  text-decoration: none !important;
  font-weight: inherit !important;
  font-size: inherit !important;
  line-height: inherit !important;
  background: transparent !important;
  padding: 0 !important;
  margin: 0 !important;
  border: none !important;
}

.mv-name a:hover {
  color: var(--accent) !important;
  text-decoration: none !important;
}

.mv-rank {
  display: block !important;
  color: var(--muted) !important;
  font-size: 14px !important;
  line-height: 1.4 !important;
  margin: 0 !important;
  padding: 0 !important;
  background: transparent !important;
  font-weight: normal !important;
}

.mv-details {
  display: block !important;
  background: #0f1220 !important;
  border: 1px solid var(--border) !important;
  border-radius: 12px !important;
  padding: 8px !important;
  margin: 5px 0 0 0 !important;
  width: 100% !important;
}

.mv-details summary {
  display: block !important;
  cursor: pointer !important;
  color: var(--accent) !important;
  font-size: 14px !important;
  font-weight: normal !important;
  line-height: 1.4 !important;
  padding: 0 !important;
  margin: 0 !important;
  background: transparent !important;
  border: none !important;
  outline: none !important;
  list-style: none !important;
  list-style-type: none !important;
}

.mv-details summary::-webkit-details-marker {
  display: none !important;
}

.mv-details summary::marker {
  display: none !important;
  content: "" !important;
}

.mv-details summary::-moz-list-bullet {
  display: none !important;
}

.mv-details[open] summary {
  margin-bottom: 8px !important;
}

.mv-awards {
  display: grid !important;
  grid-template-columns: 1fr !important;
  gap: 4px !important;
  margin: 8px 0 0 0 !important;
  padding: 0 !important;
  background: transparent !important;
}

.mv-award {
  display: block !important;
  position: relative !important;
  padding: 0 0 0 12px !important;
  margin: 0 !important;
  font-size: 13px !important;
  line-height: 1.4 !important;
  color: #ddd !important;
  background: transparent !important;
  border: none !important;
  list-style: none !important;
  list-style-type: none !important;
}

.mv-award::before {
  content: "•" !important;
  position: absolute !important;
  left: 0 !important;
  top: 0 !important;
  color: var(--accent) !important;
  font-size: 16px !important;
  line-height: 1.4 !important;
  font-family: inherit !important;
  background: transparent !important;
  display: inline-block !important;
  width: auto !important;
  height: auto !important;
  margin: 0 !important;
  padding: 0 !important;
}

#mv-loader {
  display: flex !important;
  justify-content: center !important;
  align-items: center !important;
  width: 100% !important;
  padding: 40px 0 !important;
  margin: 0 !important;
  background: transparent !important;
}

.mv-spinner {
  width: 60px !important;
  height: 60px !important;
  border: 6px solid rgba(77,163,255,0.2) !important;
  border-top-color: var(--accent) !important;
  border-radius: 50% !important;
  animation: mv-spin 1s linear infinite !important;
  margin: 0 !important;
  padding: 0 !important;
}

@keyframes mv-spin {
  0% { transform: rotate(0deg) !important; }
  100% { transform: rotate(360deg) !important; }
}

/* Адаптивность */
@media (max-width: 768px) {
  .mv-wrapper {
    padding: 10px !important;
  }
  
  .mv-grid {
    grid-template-columns: 1fr !important;
  }
}

/* Фикс для любых скрытых элементов форума */
.mv-wrapper [hidden] {
  display: none !important;
}

/* Убираем возможные фоны, рамки и тени от форума */
.mv-wrapper,
.mv-wrapper * {
  box-shadow: none !important;
  text-shadow: none !important;
  backdrop-filter: none !important;
  filter: none !important;
}

/* Специфичные сбросы для ссылок */
.mv-wrapper a:link,
.mv-wrapper a:visited,
.mv-wrapper a:hover,
.mv-wrapper a:active,
.mv-wrapper a:focus {
  color: inherit !important;
  text-decoration: none !important;
  background: transparent !important;
  outline: none !important;
}

/* Сброс для всех состояний */
.mv-wrapper *:hover,
.mv-wrapper *:focus,
.mv-wrapper *:active {
  outline: none !important;
}

/* Убираем возможные маркеры списков */
.mv-wrapper ul,
.mv-wrapper ol,
.mv-wrapper li {
  list-style: none !important;
  list-style-type: none !important;
  margin: 0 !important;
  padding: 0 !important;
}

/* Сброс для деталей */
.mv-wrapper details {
  display: block !important;
}

.mv-wrapper details > * {
  display: block !important;
}
</style>

<div class="mv-wrapper">
  <div id="mv-loader"><div class="mv-spinner"></div></div>
  <main id="mv-container"></main>
</div>

<script>
(function() {

  const sheetID = "1SkPMyszoGWxjGqaAwD-u_e5GdQ9zF-3WrZXAmKV59pE";
  const sheetName = "Лист1";
  const url = `https://opensheet.elk.sh/${sheetID}/${encodeURIComponent(sheetName)}`;

  const container = document.getElementById("mv-container");
  const loader = document.getElementById("mv-loader");

  const rankCategories = [
    {
      title: "Высший начальствующий состав",
      ranks: [
        "генерал-полковник полиции",
        "генерал-лейтенант полиции",
        "генерал-майор полиции"
      ]
    },
    {
      title: "Старший начальствующий состав",
      ranks: [
        "полковник полиции",
        "подполковник полиции",
        "майор полиции"
      ]
    },
    {
      title: "Средний начальствующий состав",
      ranks: [
        "капитан полиции",
        "старший лейтенант полиции",
        "лейтенант полиции"
      ]
    },
    {
      title: "Младший начальствующий состав",
      ranks: [
        "прапорщик полиции",
        "старшина полиции",
        "сержант полиции"
      ]
    },
    {
      title: "Рядовой состав",
      ranks: [
        "рядовой полиции"
      ]
    }
  ];

  function normalizeRank(rank) {
    return rank ? rank.toLowerCase().trim() : "";
  }

  fetch(url)
    .then(res => res.json())
    .then(data => {
      if (!Array.isArray(data)) throw new Error("Invalid data format");
      render(data);
    })
    .catch(err => {
      console.error(err);
      container.innerHTML = "<p style='color:red;text-align:center;'>Ошибка загрузки данных.</p>";
      loader.style.display = "none";
      container.classList.add("loaded");
    });

  function render(data) {
    container.innerHTML = "";

    rankCategories.forEach(category => {

      let employees = data.filter(person => {
        const rank = normalizeRank(person.rank);
        return category.ranks.includes(rank);
      });

      employees.sort((a, b) => {

        const isHeroA = a.awards?.toLowerCase().startsWith("герой республики провинция") ? 1 : 0;
        const isHeroB = b.awards?.toLowerCase().startsWith("герой республики провинция") ? 1 : 0;

        if (isHeroA !== isHeroB) return isHeroB - isHeroA;

        const indexA = category.ranks.indexOf(normalizeRank(a.rank));
        const indexB = category.ranks.indexOf(normalizeRank(b.rank));
        if (indexA !== indexB) return indexA - indexB;

        return (a.name || "").localeCompare(b.name || "", "ru");
      });

      if (!employees.length) return;

      const section = document.createElement("section");
      section.className = "mv-category";
      section.innerHTML = `<h2>${category.title}</h2><div class="mv-grid"></div>`;

      const grid = section.querySelector(".mv-grid");

      employees.forEach(person => {

        const awards = person.awards
          ? person.awards.split(";")
              .map(a => `<div class="mv-award">${a.trim()}</div>`)
              .join("")
          : "";

        const photo = person.photo
          ? `<img src="${person.photo}" alt="${person.name || ""}">`
          : `<div style="display:grid;place-items:center;height:100%;color:#777;">Нет фото</div>`;

        const nameHtml = person.forum_url
          ? `<a href="${person.forum_url}" target="_blank" rel="noopener noreferrer">${person.name || ""}</a>`
          : (person.name || "");

        const card = document.createElement("article");
        card.className = "mv-card";
        card.innerHTML = `
          <div class="mv-photo">${photo}</div>
          <div class="mv-content">
            <div class="mv-name">${nameHtml}</div>
            <div class="mv-rank">${person.rank || ""}</div>
            <details class="mv-details">
              <summary>Награды</summary>
              <div class="mv-awards">${awards}</div>
            </details>
          </div>
        `;

        grid.appendChild(card);
      });

      container.appendChild(section);
    });

    loader.style.display = "none";
    container.classList.add("loaded");

    const cards = container.querySelectorAll(".mv-card");
    cards.forEach((card, index) => {
      setTimeout(() => {
        card.classList.add("show");
      }, index * 60);
    });
  }

})();
</script>
